services:
  - type: web
    name: mrbnb-web
    env: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npx prisma db push --skip-generate && npm run build && cp -r public .next/standalone/public && cp -r .next/static .next/standalone/.next/static
    startCommand: NODE_OPTIONS='--max-old-space-size=384' node .next/standalone/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mrbnb-website-db
          property: connectionString
      - key: NEXT_PUBLIC_SITE_URL
        value: https://mrbnb.cl
      - key: NEXT_PUBLIC_GA_ID
        sync: false
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: MAILGUN_API_KEY
        sync: false
      - key: MAILGUN_DOMAIN
        value: "mrbnb.cl"
      - key: NEXT_PUBLIC_WHATSAPP
        value: "+56942237814"
      - key: CONTACT_EMAIL
        value: "felipe@mrbnb.cl"
      - key: CRON_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: mrbnb-website-db
    databaseName: mrbnb_website
    user: mrbnb_web_user
    plan: basic-256mb
