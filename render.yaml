services:
  - type: web
    name: mrbnb-web
    env: node
    plan: starter
    buildCommand: npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mrbnb-db
          property: connectionString
      - key: NEXT_PUBLIC_SITE_URL
        value: https://mrbnb.cl
      - key: NEXT_PUBLIC_GA_ID
        sync: false
      - key: NEXT_PUBLIC_GOOGLE_MAPS_KEY
        sync: false
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: NEXT_PUBLIC_WHATSAPP
        value: "+56942237814"
      - key: CONTACT_EMAIL
        value: "felipe@mrbnb.cl"
      - key: NODE_ENV
        value: production

databases:
  - name: mrbnb-db
    databaseName: mrbnb
    user: mrbnb_user
    plan: starter
